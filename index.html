<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Undertale Scene</title>

<style>
@font-face {
    font-family: 'font';
    src: url('font.ttf') format('truetype');
}

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'font', monospace;
}

#gameContainer {
    position: relative;
    width: 800px;
    height: 600px;
    margin: 0 auto;
}

canvas {
    display: block;
    background: #000;
}

#startOverlay {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: url('menu.png') center/cover no-repeat;
    z-index:5;
    transition: opacity 1.5s ease;
}

#startButton {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 40px;
    font-size:28px;
    background:black;
    color:white;
    border:3px solid white;
    cursor:pointer;
    z-index:10;
}
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="startOverlay"></div>
  <button id="startButton">Press to Start</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const startOverlay = document.getElementById("startOverlay");
const startButton = document.getElementById("startButton");

// ---------------- IMAGES ----------------

const background = new Image();
background.src = "background.png";

const walkSprites = ["walk1.png","walk2.png","walk3.png","walk4.png"].map(src=>{
  const img = new Image();
  img.src = src;
  return img;
});

const turnSprite = new Image();
turnSprite.src = "turn.png";

// ---------------- AUDIO (OPTIMIZED) ----------------

const baseBleep = new Audio("bleep.mp3");
const baseBleep1 = new Audio("bleep1.mp3");
baseBleep1.volume = 0.4;

function playBleep(sound){
  const clone = sound.cloneNode();
  clone.volume = sound.volume;
  clone.play();
}

const bgMusic = new Audio("music.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.8;

// ---------------- CHARACTER ----------------

let charX = -200;
let charY = 430;
let speed = 2;
let moving = false;
let walkFrame = 0;
let frameCount = 0;
let frameDelay = 6;

// ---------------- DIALOGUE ----------------

let dialogueStarted = false;
let waitingForClick = false;

let messages = [
  { text:"* Despite everything, it's still you."},
  { text:"* But maybe it should be us.", sound: baseBleep1 },
  { text:"* What do you say?", sound: baseBleep1 }
];

let currentMessageIndex = 0;
let displayedText = "";
let textIndex = 0;
let textSpeed = 1; // optimized
let bleepCooldown = 0;

// Cached text lines
let cachedLines = [];
let lastRenderedText = "";

// ---------------- TEXT WRAP (CACHED) ----------------

function wrapTextToLines(ctx, text, maxWidth){
  const lines = [];
  const words = text.split(" ");
  let currentLine = "";

  for(let i=0;i<words.length;i++){
    const testLine = currentLine + words[i] + " ";
    if(ctx.measureText(testLine).width > maxWidth && currentLine !== ""){
      lines.push(currentLine);
      currentLine = words[i] + " ";
    } else {
      currentLine = testLine;
    }
  }
  lines.push(currentLine);
  return lines;
}

// ---------------- CLICK HANDLING ----------------

canvas.addEventListener("click", ()=>{
  if(waitingForClick){
    currentMessageIndex++;
    if(currentMessageIndex < messages.length){
      displayedText = "";
      textIndex = 0;
      waitingForClick = false;
    }
  }
});

// ---------------- RESTART ----------------

function restartScene(){
  charX = -200;
  moving = false;
  walkFrame = 0;
  frameCount = 0;

  currentMessageIndex = 0;
  displayedText = "";
  textIndex = 0;
  waitingForClick = false;
  dialogueStarted = false;

  bgMusic.pause();
  bgMusic.currentTime = 0;

  startOverlay.style.display = "block";
  startOverlay.style.opacity = 1;
  startButton.style.display = "block";
}

// ---------------- GAME LOOP ----------------

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(background,0,0,800,600);

  // CHARACTER
  const sprite = moving ? walkSprites[walkFrame] : turnSprite;
  const scale = 0.25;
  const w = sprite.width * scale;
  const h = sprite.height * scale;

  ctx.drawImage(sprite,charX,charY-h,w,h);

  // MOVEMENT
  if(moving){
    if(charX < 470){
      charX += speed;
      frameCount++;
      if(frameCount >= frameDelay){
        walkFrame = (walkFrame+1)%walkSprites.length;
        frameCount = 0;
      }
    } else {
      moving = false;
      dialogueStarted = true;
    }
  }

  // DIALOGUE
  if(dialogueStarted && currentMessageIndex < messages.length){
    const currentMsg = messages[currentMessageIndex];

    if(textIndex < currentMsg.text.length){
      textIndex += textSpeed;
      displayedText = currentMsg.text.slice(0,textIndex);

      if(displayedText !== lastRenderedText){
        cachedLines = wrapTextToLines(ctx, displayedText, 650);
        lastRenderedText = displayedText;
      }

      if(bleepCooldown <= 0){
        const soundToPlay = currentMsg.sound || baseBleep;
        playBleep(soundToPlay);
        bleepCooldown = 3;
      } else {
        bleepCooldown--;
      }

    } else {
      waitingForClick = true;
    }

    // Draw box
    ctx.fillStyle = "black";
    ctx.fillRect(35,450,730,120);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.strokeRect(35,450,730,120);

    ctx.fillStyle = "white";
    ctx.font = "28px font";

    for(let i=0;i<cachedLines.length;i++){
      ctx.fillText(cachedLines[i],75,490+i*30);
    }
  }

  requestAnimationFrame(gameLoop);
}

// ---------------- START BUTTON ----------------

startButton.addEventListener("click", ()=>{
  moving = true;
  startOverlay.style.opacity = 0;
  startButton.style.display = "none";
  bgMusic.play();

  setTimeout(()=>{
    startOverlay.style.display = "none";
  },1500);
});

// ---------------- LOAD ----------------

let loaded = 0;
const totalImages = walkSprites.length + 2;

function checkLoaded(){
  loaded++;
  if(loaded === totalImages){
    gameLoop();
  }
}

background.onload = checkLoaded;
turnSprite.onload = checkLoaded;
walkSprites.forEach(img=>img.onload=checkLoaded);

</script>
</body>
</html>
